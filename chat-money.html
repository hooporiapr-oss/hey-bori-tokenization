<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talk To Bori — Get Ready Hoops</title>
<meta name="description" content="Free chat with Bori — ask anything about the business of basketball, money, NIL, reputation, and decisions. No signup needed." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --black:#07070b;
  --dark:#101018;
  --panel:#171722;
  --panel2:#202033;
  --gold:#e8b94a;
  --gold-dim:rgba(232,185,74,.15);
  --white:#f4f1e8;
  --muted:#b9b4a8;
  --green:#7cff6b;
  --blue:#48c6ff;
  --red:#ff4f6d;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--black);
  color:var(--white);
  font-family:'Barlow',sans-serif;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}

/* HEADER */
.chat-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  background:rgba(7,7,11,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
  gap:12px;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:14px;
}
.back-link{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1.5px;
  font-weight:700;
  padding:8px 12px;
  border:1px solid rgba(255,255,255,.1);
  border-radius:8px;
  transition:.2s ease;
}
.back-link:hover{border-color:var(--gold);color:var(--gold)}
.nav-brand{
  display:flex;
  align-items:center;
  gap:10px;
}
.nav-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  letter-spacing:2px;
  font-size:18px;
  color:var(--white);
  text-transform:uppercase;
}
.nav-title span{color:var(--gold)}
.nav-sub{
  font-size:11px;
  color:var(--green);
  text-transform:uppercase;
  letter-spacing:1.5px;
  font-weight:700;
}
.nav-right{
  display:flex;
  align-items:center;
  gap:8px;
}
.nav-btn{
  background:transparent;
  border:1px solid rgba(255,255,255,.12);
  color:var(--muted);
  padding:8px 12px;
  border-radius:8px;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:.2s ease;
}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.lang-toggle{display:flex;gap:4px}
.lang-btn{
  background:transparent;
  border:none;
  color:var(--muted);
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  font-size:11px;
  padding:8px 8px;
}
.lang-btn.active{color:var(--gold)}

/* BORI INTRO BAR */
.bori-bar{
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 20px;
  background:linear-gradient(90deg, rgba(232,185,74,.08), rgba(232,185,74,.02));
  border-bottom:1px solid rgba(232,185,74,.15);
  flex-shrink:0;
}
.bori-avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--gold),#a68530);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:18px;
  color:#111;
  flex-shrink:0;
  box-shadow:0 0 20px rgba(232,185,74,.3);
}
.bori-info{flex:1;min-width:0}
.bori-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:900;
  font-size:18px;
  color:var(--gold);
  letter-spacing:1px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
}
.online-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 10px var(--green);
}
.bori-role{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow-y:auto;
  padding:24px 20px 20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

.msg{
  max-width:80%;
  padding:14px 18px;
  border-radius:18px;
  line-height:1.55;
  font-size:15px;
  word-wrap:break-word;
  white-space:pre-wrap;
}
.msg.bori{
  align-self:flex-start;
  background:linear-gradient(135deg,rgba(232,185,74,.14),rgba(232,185,74,.06));
  border:1px solid rgba(232,185,74,.25);
  color:var(--white);
  border-top-left-radius:4px;
}
.msg.bori::before{
  content:"BORI";
  display:block;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;
  font-weight:900;
  letter-spacing:1.5px;
  color:var(--gold);
  opacity:.8;
  margin-bottom:4px;
}
.msg.user{
  align-self:flex-end;
  background:rgba(72,198,255,.12);
  border:1px solid rgba(72,198,255,.22);
  color:var(--white);
  border-top-right-radius:4px;
}
.msg.system{
  align-self:center;
  background:transparent;
  color:var(--muted);
  font-size:13px;
  font-style:italic;
  max-width:90%;
  text-align:center;
  padding:8px 14px;
}

.typing{
  align-self:flex-start;
  padding:14px 18px;
  border-radius:18px;
  border-top-left-radius:4px;
  background:rgba(232,185,74,.08);
  border:1px solid rgba(232,185,74,.18);
  display:flex;
  align-items:center;
  gap:5px;
}
.typing span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--gold);
  opacity:.5;
  animation:bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:.4}
  40%{transform:translateY(-6px);opacity:1}
}

/* INPUT */
.composer{
  padding:16px 20px;
  background:rgba(7,7,11,.95);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
  padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));
}
.composer-row{
  display:flex;
  align-items:flex-end;
  gap:10px;
  background:var(--panel);
  border:1px solid rgba(255,255,255,.1);
  border-radius:18px;
  padding:8px 8px 8px 16px;
  transition:border-color .2s;
}
.composer-row:focus-within{
  border-color:rgba(232,185,74,.4);
}
.composer textarea{
  flex:1;
  background:transparent;
  border:none;
  color:var(--white);
  font-family:'Barlow',sans-serif;
  font-size:15px;
  resize:none;
  outline:none;
  max-height:120px;
  line-height:1.5;
  padding:8px 0;
}
.composer textarea::placeholder{color:var(--muted)}
.send-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  background:var(--gold);
  color:#111;
  border:none;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  flex-shrink:0;
  transition:.2s ease;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(232,185,74,.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

.disclaimer{
  text-align:center;
  font-size:11px;
  color:#555;
  margin-top:8px;
  letter-spacing:.5px;
}

/* SUGGESTIONS */
.suggestions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
  padding:0 2px;
}
.suggestion{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  color:var(--muted);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:.2s ease;
}
.suggestion:hover{
  border-color:rgba(232,185,74,.5);
  color:var(--gold);
  background:rgba(232,185,74,.05);
}

@media (max-width: 600px){
  .nav-sub{display:none}
  .back-link span{display:none}
  .back-link::after{content:"← Back"}
  .msg{max-width:90%}
  .nav-btn{padding:7px 10px;font-size:10px}
}
</style>
</head>
<body>

<nav class="chat-nav">
  <div class="nav-left">
    <a href="/" class="back-link" data-en="← Back" data-es="← Volver">← <span></a>
    <div class="nav-brand">
      <div class="nav-sub" data-en="Free Chat" data-es="Chat Gratis">Free Chat</div>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-btn" id="newChatBtn" data-en="New" data-es="Nuevo">New</button>
    <button class="nav-btn" id="pdfBtn" data-en="PDF" data-es="PDF">PDF</button>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </div>
</nav>

<div class="bori-bar">
  <div class="bori-avatar">B</div>
  <div class="bori-info">
    <div class="bori-name">Bori <span class="online-dot"></span></div>
    <div class="bori-role" data-en="Your mentor for the business of basketball" data-es="Tu mentor para el negocio del baloncesto">Your mentor for the business of basketball</div>
  </div>
</div>

<div class="messages" id="messages">
  <!-- Messages render here -->
</div>

<div class="composer">
  <div class="suggestions" id="suggestions">
    <div class="suggestion" data-en="Why would someone choose me?" data-es="¿Por qué alguien me escogería?">Why would someone choose me?</div>
    <div class="suggestion" data-en="What should my page say about me?" data-es="¿Qué debe decir mi página sobre mí?">What should my page say about me?</div>
    <div class="suggestion" data-en="Am I ready for the next level?" data-es="¿Estoy listo para el próximo nivel?">Am I ready for the next level?</div>
  </div>
  <div class="composer-row">
    <textarea id="input" rows="1" data-en-placeholder="Ask Bori anything..." data-es-placeholder="Pregúntale lo que sea a Bori..." placeholder="Ask Bori anything..."></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Send">→</button>
  </div>
  <div class="disclaimer" data-en="Educational content only. Not legal or financial advice." data-es="Contenido educativo solamente. No son consejos legales o financieros.">Educational content only. Not legal or financial advice.</div>
</div>

<script>
// ─────────── LANGUAGE ───────────
let currentLang = localStorage.getItem('grhLang') || 'en';

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('grhLang', lang);
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-en]').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if(text && !el.hasAttribute('data-en-placeholder')){
      el.textContent = text;
    }
  });

  document.querySelectorAll('[data-en-placeholder]').forEach(el => {
    const ph = el.getAttribute('data-' + lang + '-placeholder');
    if(ph) el.placeholder = ph;
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});
setLang(currentLang);

// ─────────── ANON ID ───────────
function getAnonId(){
  let id = localStorage.getItem('grhAnonId');
  if(!id){
    id = 'anon_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('grhAnonId', id);
  }
  return id;
}
const anonId = getAnonId();

// ─────────── STATE ───────────
const STORAGE_KEY = 'grhConversation';
let messages = [];

function loadConversation(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      messages = JSON.parse(saved);
    }
  }catch(e){ messages = []; }
}

function saveConversation(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  }catch(e){}
}

function clearConversation(){
  messages = [];
  saveConversation();
  renderMessages();
  showGreeting();
}

// ─────────── WELCOME ───────────
const WELCOME = {
  en: "What's up. I'm Bori — your mentor for the business side of basketball.\n\nI'm here to help you think. About money, reputation, decisions, pressure, and everything most players figure out too late.\n\nAsk me anything. And if you don't know where to start, try one of the questions below.",
  es: "¿Qué tal? Soy Bori — tu mentor para el lado de negocio del baloncesto.\n\nEstoy aquí para hacerte pensar. Sobre el dinero, la reputación, las decisiones, la presión, y todo lo que la mayoría de los jugadores entienden demasiado tarde.\n\nPregúntame lo que sea. Y si no sabes por dónde empezar, prueba una de las preguntas de abajo."
};

function showGreeting(){
  if(messages.length === 0){
    renderSingleMessage('bori', WELCOME[currentLang] || WELCOME.en);
  }
}

// ─────────── RENDER ───────────
const messagesEl = document.getElementById('messages');

function renderSingleMessage(role, content){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMessages(){
  messagesEl.innerHTML = '';
  for(const m of messages){
    renderSingleMessage(m.role === 'assistant' ? 'bori' : 'user', m.content);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(){
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping(){
  const el = document.getElementById('typingIndicator');
  if(el) el.remove();
}

// ─────────── SEND ───────────
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function autoResize(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}
input.addEventListener('input', autoResize);

input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

document.querySelectorAll('.suggestion').forEach(s => {
  s.addEventListener('click', () => {
    input.value = s.textContent;
    autoResize();
    sendMessage();
  });
});

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  // Add user message
  messages.push({ role: 'user', content: text });
  renderSingleMessage('user', text);
  saveConversation();

  input.value = '';
  autoResize();
  sendBtn.disabled = true;

  // Hide suggestions after first message
  document.getElementById('suggestions').style.display = 'none';

  showTyping();

  try{
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: messages,
        anonId: anonId,
        lang: currentLang
      })
    });

    hideTyping();

    if(!res.ok){
      const err = await res.json().catch(() => ({}));
      const errMsg = err.error || (currentLang === 'es'
        ? 'Algo salió mal. Intenta de nuevo.'
        : 'Something went wrong. Please try again.');
      renderSingleMessage('bori', errMsg);
      sendBtn.disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data.reply || (currentLang === 'es'
      ? 'No pude responder. Intenta de nuevo.'
      : "I couldn't respond. Try again.");

    messages.push({ role: 'assistant', content: reply });
    renderSingleMessage('bori', reply);
    saveConversation();

  }catch(e){
    hideTyping();
    renderSingleMessage('bori', currentLang === 'es'
      ? 'Error de conexión. Intenta de nuevo.'
      : 'Connection error. Try again.');
  }

  sendBtn.disabled = false;
  input.focus();
}

// ─────────── NEW CHAT ───────────
document.getElementById('newChatBtn').addEventListener('click', () => {
  if(messages.length > 0 && !confirm(currentLang === 'es'
    ? '¿Empezar una nueva conversación? Se borrará la actual.'
    : 'Start a new conversation? This will clear the current one.')) return;
  clearConversation();
  document.getElementById('suggestions').style.display = 'flex';
});

// ─────────── PDF EXPORT ───────────
document.getElementById('pdfBtn').addEventListener('click', () => {
  if(messages.length === 0){
    alert(currentLang === 'es' ? 'No hay conversación para exportar.' : 'No conversation to export.');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pageWidth = doc.internal.pageSize.width;
  const margin = 15;
  const maxWidth = pageWidth - (margin * 2);
  let y = 20;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.text('Get Ready Hoops — ' + (currentLang === 'es' ? 'Conversación con Bori' : 'Conversation with Bori'), margin, y);
  y += 10;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(120);
  doc.text(new Date().toLocaleString(), margin, y);
  y += 10;
  doc.setTextColor(0);

  for(const m of messages){
    const label = m.role === 'assistant' ? 'Bori:' : (currentLang === 'es' ? 'Tú:' : 'You:');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    if(y > 270){ doc.addPage(); y = 20; }
    doc.text(label, margin, y);
    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    const lines = doc.splitTextToSize(m.content, maxWidth);
    for(const line of lines){
      if(y > 280){ doc.addPage(); y = 20; }
      doc.text(line, margin, y);
      y += 5;
    }
    y += 4;
  }

  doc.save('get-ready-hoops-bori-' + Date.now() + '.pdf');
});

// ─────────── INIT ───────────
loadConversation();
renderMessages();
showGreeting();
input.focus();
</script>

</body>
</html>
